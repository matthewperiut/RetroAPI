# Per-commit build check. Adapted from the Aether project's build.yml.
# RetroAPI needs Java 21 (not 17) and builds on Linux. Runs the FULL build with -Pstationapi, so it
# compiles core + the retroapi-stationapi compat module + the StationAPI test variant and produces the
# Ornithe + babric jars (with the compat JiJ'd into both).
name: Build Check

on: [ pull_request, push ]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build (always includes retroapi-stationapi)
        run: |
          chmod +x ./gradlew
          ./gradlew build -Pstationapi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-libs
          path: build/libs/**/*
