# Release publishing. Builds ALWAYS with -Pstationapi so the retroapi-stationapi compat is JiJ'd into
# both distribution jars, then publishes:
#
#   * Ornithe jar  (retroapi-<ver>.jar)        -> Modrinth (loader: fabric, requires OSL) + GitHub release
#   * Babric bundle (retroapi-<ver>-babric.jar) -> Modrinth (loader: babric ONLY)         + GitHub release
#
# The babric bundle is self-contained (OSL + joptsimple are reverse-converted and nested inside it), so it
# lists NO OSL dependency. The Ornithe jar does not bundle OSL, so OSL is a required Modrinth dependency.
# Both jars carry the StationAPI compat as a nested mod that self-activates only when StationAPI is present.
#
# It then publishes the Ornithe maven artifact into the matthewperiut.github.io repo (under repository/),
# refreshes manifest.json / repository-tree.json / maven-metadata.xml, bumps every retroapi version mention
# in the docs and the two template-mod zips, and commits it as "actions: update retroapi".
#
# Required configuration:
#   * secret   MODRINTH_TOKEN - a Modrinth PAT with write scope
#   * secret   PAGES_TOKEN    - a PAT with write access to matthewperiut/matthewperiut.github.io
#   * variable MODRINTH_ID    - the RetroAPI Modrinth project id or slug
# Triggered when a GitHub Release is published (any tag name), or manually via the Actions tab. The
# workflow must exist on the default branch (main) for the release event to pick it up.
name: Publish

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build + publish to Maven Local (always includes retroapi-stationapi)
        run: |
          chmod +x ./gradlew
          ./gradlew build publish -Pstationapi

      - name: Resolve version
        id: ver
        run: echo "version=$(grep -E '^version' gradle.properties | sed 's/.*=[[:space:]]*//')" >> "$GITHUB_OUTPUT"

      # --- GitHub release: both the Ornithe and babric jars (idempotent - updates the tag's release) ---
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/retroapi-${{ steps.ver.outputs.version }}.jar
            build/libs/retroapi-${{ steps.ver.outputs.version }}-babric.jar
          fail_on_unmatched_files: true
          body_path: .github/release-notes.md

      # --- Maven repository / docs / templates on matthewperiut.github.io ---
      # Runs BEFORE Modrinth so a Modrinth duplicate-version rejection on a re-run can't block the
      # pages auto-update. Both this and the GitHub release above are idempotent.
      - name: Checkout pages repo
        uses: actions/checkout@v4
        with:
          repository: matthewperiut/matthewperiut.github.io
          token: ${{ secrets.PAGES_TOKEN }}
          path: pages
      - name: Update pages (maven repo, manifests, docs, template zips)
        run: |
          python3 .github/scripts/update_pages.py \
            --pages pages \
            --version "${{ steps.ver.outputs.version }}" \
            --commit "${{ github.sha }}" \
            --branch "${{ github.event.repository.default_branch }}"
      - name: Commit & push pages
        working-directory: pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no pages changes to commit"
          else
            git commit -m "actions: update retroapi"
            git push
          fi

      # --- Modrinth (last: non-idempotent - rejects a duplicate version on re-runs) ---
      # Ornithe build: Fabric loader, OSL required.
      - name: Publish Ornithe to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/retroapi-${{ steps.ver.outputs.version }}.jar
          name: RetroAPI ${{ steps.ver.outputs.version }} (Ornithe)
          version: ${{ steps.ver.outputs.version }}
          version-type: beta
          loaders: fabric
          game-versions: b1.7.3
          changelog-file: .github/release-notes.md
          dependencies: |
            osl(required)

      # Babric bundle: Babric loader ONLY, self-contained - no OSL dependency.
      - name: Publish Babric to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/retroapi-${{ steps.ver.outputs.version }}-babric.jar
          name: RetroAPI ${{ steps.ver.outputs.version }} (Babric)
          version: ${{ steps.ver.outputs.version }}+babric
          version-type: beta
          loaders: babric
          game-versions: b1.7.3
          changelog-file: .github/release-notes.md
